<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Training</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <button class="topbar-hamburger" id="hamburger">&#9776;</button>
    <a class="topbar-back" id="back-btn" href="#" style="display:none">&#8592; Courses</a>
    <span class="topbar-title" id="topbar-title">Interactive Training</span>
    <div class="topbar-progress">
      <div class="topbar-progress-bar">
        <div class="topbar-progress-fill" id="progress-fill"></div>
      </div>
      <span class="topbar-progress-text" id="progress-text"></span>
    </div>
    <button class="topbar-reset" id="reset-btn" style="display:none">Reset Progress</button>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main-content"></main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
