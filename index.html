<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Training</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <button class="topbar-hamburger" id="hamburger">&#9776;</button>
    <a class="topbar-back" id="back-btn" href="#" style="display:none">&#8592; Courses</a>
    <span class="topbar-title" id="topbar-title">Interactive Training</span>
    <div class="topbar-progress">
      <div class="topbar-progress-bar">
        <div class="topbar-progress-fill" id="progress-fill"></div>
      </div>
      <span class="topbar-progress-text" id="progress-text"></span>
    </div>
    <button class="topbar-reset" id="reset-btn" style="display:none">Reset Progress</button>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main-content"></main>
  </div>

  <div class="ai-widget" id="ai-widget" style="display:none">
    <button class="ai-widget-toggle" id="ai-toggle">Ask a question</button>
    <div class="ai-widget-panel" id="ai-panel" style="display:none">
      <div class="ai-widget-header">
        <span class="ai-widget-header-title">AI Assistant</span>
        <button class="ai-widget-close" id="ai-close">&#10005;</button>
      </div>
      <div class="ai-widget-messages" id="ai-messages"></div>
      <div class="ai-widget-input-area">
        <textarea class="ai-widget-input" id="ai-input" placeholder="Ask about this lesson..." rows="2"></textarea>
        <button class="btn btn-primary ai-widget-send" id="ai-send">Send</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
